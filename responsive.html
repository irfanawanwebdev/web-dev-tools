<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Preview · Web Dev Tools</title>
  <style>
    :root {
      --bg: #14171c; --panel: #1b1f24; --elevated: #22272e; --border: #30363d;
      --text: #e6edf3; --muted: #9aa4b0; --accent: #2f81f7;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font: 13px/1.5 var(--font); display: flex; flex-direction: column; }

    .bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border);
    }
    .bar-group { display: flex; align-items: center; gap: 6px; }
    .bar label { color: var(--muted); font-size: 12px; }
    select, input[type="number"], button {
      background: var(--elevated); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; font: inherit; padding: 5px 8px;
    }
    input[type="number"] { width: 64px; }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.icon { padding: 5px 9px; }
    .dim { color: var(--muted); font-size: 12px; }
    .check { display: flex; align-items: center; gap: 5px; cursor: help; }
    .help {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%; font-size: 10px; font-weight: 700;
      background: var(--border); color: var(--muted);
    }
    .url {
      flex: 1; min-width: 120px; color: var(--muted); font-size: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .size-readout { color: var(--muted); font-size: 12px; min-width: 90px; }

    .stage {
      flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center;
      padding: 24px;
      background:
        linear-gradient(45deg, #1a1e24 25%, transparent 25%) 0 0 / 24px 24px,
        linear-gradient(-45deg, #1a1e24 25%, transparent 25%) 0 12px / 24px 24px,
        linear-gradient(45deg, transparent 75%, #1a1e24 75%) 12px -12px / 24px 24px,
        linear-gradient(-45deg, transparent 75%, #1a1e24 75%) -12px 0 / 24px 24px;
    }
    .frame-wrap { position: relative; transition: width .15s, height .15s; }
    .frame-label {
      position: absolute; top: -20px; left: 0; font-size: 11px; color: var(--muted);
      white-space: nowrap;
    }
    iframe {
      background: #fff; border: 0; box-shadow: 0 8px 40px rgba(0,0,0,.5);
      transform-origin: top left; display: block;
    }
    .msg { padding: 40px; text-align: center; color: var(--muted); max-width: 460px; }
    .msg button { margin-top: 14px; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="bar-group">
      <label for="device">Device</label>
      <select id="device" title="Pick a device preset and the page reflows to that screen width"></select>
    </div>
    <div class="bar-group" title="Viewport width × height in CSS pixels">
      <input type="number" id="w" min="200" max="4000"> <span class="dim">×</span>
      <input type="number" id="h" min="200" max="4000">
      <button id="rotate" class="icon" title="Rotate: swap width and height (portrait ⇄ landscape)">⟳</button>
    </div>
    <div class="bar-group">
      <label for="zoom" title="Zoom. Fit scales large devices down to fit your screen; the layout stays at the real device width">Zoom</label>
      <select id="zoom" title="Zoom. Fit scales large devices down to fit your screen; the layout stays at the real device width">
        <option value="fit">Fit</option>
        <option value="1">100%</option>
        <option value="0.75">75%</option>
        <option value="0.5">50%</option>
        <option value="0.33">33%</option>
      </select>
    </div>
    <span class="size-readout" id="readout"></span>
    <div class="bar-group">
      <label class="check" title="Mobile User-Agent: tells the website you're visiting on a phone, so it serves its mobile version instead of the desktop site. Reloads the frame.">
        <input type="checkbox" id="ua"> Mobile UA <span class="help" aria-hidden="true">?</span>
      </label>
    </div>
    <button id="reload" class="icon" title="Reload the previewed page">↻</button>
    <button id="shot" class="primary" title="Capture the whole page at this viewport size as one PNG (scrolls and stitches automatically)">Screenshot</button>
    <span class="dim" id="shotProg"></span>
    <span class="url" id="url" title="The page being previewed"></span>
    <button id="openTab" title="Open this URL as a normal browser tab">Open in tab</button>
  </div>
  <div class="stage" id="stage"></div>
  <script src="responsive.js"></script>
</body>
</html>
